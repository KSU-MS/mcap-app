services:
  cloud_webserver_v2:
    container_name: cloud_webserver_v2
    build:
      context: ./backend_v2
    env_file:
      - ./backend_v2/cmd/cloud_webserver_v2/.env
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    volumes:
      - matlab_mps_data:/mps_data
      - run_metadata:/data/run_metadata
      - cloud_webserver_v2_files:/app/files
      - cloud_webserver_v2_logs:/app/logs
    ports:
      - "8080:8080"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: quay.io/minio/mc:latest
    container_name: minio-create-bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/my-test-bucket;
      exit 0;
      "

volumes:
  cloud_webserver_v2_files:
  cloud_webserver_v2_logs:
  run_metadata:
  matlab_mps_data:
  mongodb_data:
  minio_data:
