services:
  cloud_webserver_v2:
    container_name: cloud_webserver_v2
    build:
      context: ./backend_v2
    env_file:
      - ./backend_v2/cmd/cloud_webserver_v2/.env
    depends_on:
      - mongodb
      - minio
      - minio-create-bucket
    volumes:
      - matlab_mps_data:/mps_data
      - run_metadata:/data/run_metadata
      - cloud_webserver_v2_files:/app/files
      - cloud_webserver_v2_logs:/app/logs
    expose:
      - "8080"
    networks:
      - query-shared
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    env_file:
      - ./backend_v2/cmd/cloud_webserver_v2/.env
    volumes:
      - mongodb_data:/data/db
    networks:
      - query-shared

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file:
      - ./backend_v2/cmd/cloud_webserver_v2/.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - query-shared

  minio-create-bucket:
    image: quay.io/minio/mc:latest
    container_name: minio-create-bucket
    depends_on:
      - minio
    env_file:
      - ./backend_v2/cmd/cloud_webserver_v2/.env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${AWS_S3_RUN_BUCKET};
      exit 0;
      "
    networks:
      - query-shared

volumes:
  cloud_webserver_v2_files:
  cloud_webserver_v2_logs:
  run_metadata:
  matlab_mps_data:
  mongodb_data:
  minio_data:

networks:
  query-shared:
    external: true
    name: query-shared
