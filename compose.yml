services:
  db:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    restart: always
    shm_size: 128mb
    command: ["postgres", "-p", "${POSTGRES_CONTAINER_PORT:-5432}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcap_query_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -p ${POSTGRES_CONTAINER_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
