services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcap_query_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: mcap-migrate:nix
    restart: "no"
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/mcap_query_db}
      POSTGRES_DB: ${POSTGRES_DB:-mcap_query_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      MEDIA_ROOT: /app/media
      MCAP_LOGS_DIR: ${MCAP_LOGS_DIR:-}
      MCAP_LOGS_SUBDIR: ${MCAP_LOGS_SUBDIR:-mcap_logs}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    image: mcap-backend:nix
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_HOST: 0.0.0.0
      DJANGO_PORT: 18000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/mcap_query_db}
      POSTGRES_DB: ${POSTGRES_DB:-mcap_query_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      MEDIA_ROOT: /app/media
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}
      MCAP_LOGS_DIR: ${MCAP_LOGS_DIR:-}
      MCAP_LOGS_SUBDIR: ${MCAP_LOGS_SUBDIR:-mcap_logs}
    expose:
      - "18000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  celery:
    image: mcap-celery:nix
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/mcap_query_db}
      POSTGRES_DB: ${POSTGRES_DB:-mcap_query_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      MEDIA_ROOT: /app/media
      MCAP_LOGS_DIR: ${MCAP_LOGS_DIR:-}
      MCAP_LOGS_SUBDIR: ${MCAP_LOGS_SUBDIR:-mcap_logs}
      CELERY_LOG_LEVEL: ${CELERY_LOG_LEVEL:-info}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
      CELERY_POOL: ${CELERY_POOL:-prefork}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    image: mcap-frontend:nix
    restart: unless-stopped
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 13000
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "13000"
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-13000}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  media_data:
